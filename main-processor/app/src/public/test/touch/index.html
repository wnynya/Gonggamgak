<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=" />

    <title>Touch Matrix</title>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="screen">
      <section class="panel" aria-label="2 by 2 touch matrix monitor">
        <div class="topline">
          <div>
            <p class="label">TOUCH</p>
            <h1>2x2 Matrix</h1>
          </div>
          <div id="status" class="status">connecting</div>
        </div>

        <div class="grid" aria-live="polite">
          <div class="cell" data-index="0"><strong>0</strong></div>
          <div class="cell" data-index="1"><strong>0</strong></div>
          <div class="cell" data-index="2"><strong>0</strong></div>
          <div class="cell" data-index="3"><strong>0</strong></div>
        </div>
      </section>
    </main>

    <script src="index.js" type="module"></script>
  </body>
</html>
