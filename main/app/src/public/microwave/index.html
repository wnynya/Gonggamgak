<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <h1>공감각의 전자레인지에 아무거나 나오게 하는 페이지</h1>
    <hr />
    <input type="text" id="text" placeholder="표시할 글자" />
    <button id="send">전송</button>
    <br />
    <br />
    <label>딜레이</label>
    <input
      type="number"
      id="delay"
      value="200"
      placeholder="글자가 움직이는 속도"
    />
    <span>ms</span>
    <br />
    <input type="checkbox" id="m1" checked />
    <span>오른쪽 전자레인지</span>
    <br />
    <input type="checkbox" id="m2" checked />
    <span>왼쪽 전자레인지</span>
    <script src="index.js" type="module"></script>
  </body>
</html>
