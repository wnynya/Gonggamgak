<!doctype html>
<html>
  <head>
    <style>
      @keyframes colorLoop {
        0% {
          background-color: rgb(255, 75, 255);
        }
        50% {
          background-color: rgb(75, 105, 255);
        }
        100% {
          background-color: rgb(75, 255, 243);
        }
      }
      body {
        margin: 0;
        animation: colorLoop 4s infinite ease-in-out;
      }
    </style>
  </head>
  <body></body>
</html>
