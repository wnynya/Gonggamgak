<!doctype html>
<html>
  <head>
    <style>
      @keyframes colorLoop {
        0% {
          background-color: rgb(255, 75, 255);
        }
        20% {
          background-color: rgb(75, 105, 255);
        }
        40% {
          background-color: rgb(75, 255, 249);
        }
        60% {
          background-color: rgb(75, 255, 75);
        }
        80% {
          background-color: rgb(255, 217, 0);
        }
        100% {
          background-color: rgb(255, 75, 255);
        }
      }
      body {
        margin: 0;
        animation: colorLoop 15s infinite ease-in-out;
      }
    </style>
  </head>
  <body></body>
</html>
